<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LIVORA — Denúncias</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800;900&display=swap');
    body{font-family:'Plus Jakarta Sans',sans-serif;background:radial-gradient(circle at 15% 10%,rgba(239,68,68,.14),transparent 32%),radial-gradient(circle at 85% 15%,rgba(236,72,153,.15),transparent 34%),#070312;color:white;min-height:100vh}
    .glass{background:rgba(12,7,33,.78);border:1px solid rgba(168,85,247,.24);backdrop-filter:blur(22px);box-shadow:0 30px 90px rgba(0,0,0,.34)}
    .report-card{background:linear-gradient(180deg,rgba(20,11,46,.94),rgba(10,5,29,.97));border:1px solid rgba(168,85,247,.18)}
  </style>
</head>
<body>
  <header class="px-5 py-5 md:px-10 flex items-center justify-between">
    <a href="index.html" class="flex items-center gap-3 group">
      <div class="w-11 h-11 rounded-2xl bg-gradient-to-tr from-red-500 via-pink-500 to-purple-600 flex items-center justify-center shadow-lg shadow-red-500/20 group-hover:rotate-6 transition-all">
        <i data-lucide="flag" class="w-6 h-6 text-white"></i>
      </div>
      <div>
        <div class="text-2xl font-black tracking-tight bg-gradient-to-r from-white via-red-200 to-pink-400 bg-clip-text text-transparent">LIVORA Reports</div>
        <div class="text-[9px] text-red-300 font-black tracking-[0.28em] uppercase -mt-1">Moderação</div>
      </div>
    </a>

    <div class="flex items-center gap-3">
      <button onclick="seedDemoReport()" class="rounded-full border border-red-500/30 bg-red-500/10 px-5 py-2.5 text-xs font-black text-red-300 hover:bg-red-500/20 transition-all">Criar denúncia teste</button>
      <a href="admin_safety.html" class="rounded-full border border-yellow-500/30 bg-yellow-500/10 px-5 py-2.5 text-xs font-black text-yellow-300">Safety</a>
      <a href="index.html" class="rounded-full bg-gradient-to-r from-pink-500 to-purple-600 px-5 py-2.5 text-xs font-black text-white shadow-lg">Voltar</a>
    </div>
  </header>

  <main class="px-5 pb-12 md:px-10">
    <section class="mx-auto max-w-7xl">
      <div class="glass rounded-[2rem] p-6 md:p-10">
        <span class="inline-flex items-center gap-2 rounded-full bg-red-500/10 border border-red-500/30 px-4 py-2 text-xs font-black text-red-300">
          <i data-lucide="flag" class="w-4 h-4"></i> PAINEL DE DENÚNCIAS
        </span>

        <h1 class="mt-5 text-4xl md:text-6xl font-black leading-[0.95] tracking-tight">
          Denúncias e Bloqueios
          <span class="block bg-gradient-to-r from-red-300 via-pink-300 to-purple-300 bg-clip-text text-transparent">LIVORA</span>
        </h1>

        <p class="mt-5 max-w-3xl text-purple-100/75 leading-relaxed">
          Aqui aparecem denúncias enviadas por utilizadores. No MVP ficam guardadas no navegador. Em produção, devem ser guardadas no Supabase e revistas por administradores.
        </p>
      </div>

      <div id="reports-list" class="mt-8 space-y-4"></div>
    </section>
  </main>

  <script>
    document.addEventListener('DOMContentLoaded',()=>{lucide.createIcons();renderReports();});
    function getReports(){return JSON.parse(localStorage.getItem('livora_user_reports')||'[]')}
    function setReports(reports){localStorage.setItem('livora_user_reports',JSON.stringify(reports));renderReports()}

    function seedDemoReport(){
      const reports=getReports();
      reports.unshift({id:'RP-'+Date.now(),targetId:'demo',targetName:'Utilizador Teste',context:'live',reason:'assédio',details:'Exemplo de denúncia para testar o painel.',status:'pending_review',severity:'medium',createdAt:new Date().toISOString(),action:'reported'});
      setReports(reports);
    }

    function renderReports(){
      const reports=getReports();
      const list=document.getElementById('reports-list');

      if(!reports.length){
        list.innerHTML=`<div class="report-card rounded-3xl p-8 text-center">
          <i data-lucide="shield-check" class="w-10 h-10 text-green-300 mx-auto mb-4"></i>
          <h2 class="text-xl font-black">Nenhuma denúncia recebida</h2>
          <p class="text-sm text-purple-400 mt-2">Quando alguém denunciar um perfil, live ou mensagem, aparecerá aqui.</p>
        </div>`;
        lucide.createIcons();
        return;
      }

      list.innerHTML=reports.map(report=>{
        const date=new Date(report.createdAt).toLocaleString('pt-PT');
        const severe=report.severity==='high';
        return `<article class="report-card rounded-3xl p-5 md:p-6">
          <div class="flex flex-col lg:flex-row lg:items-start lg:justify-between gap-5">
            <div class="flex gap-4">
              <div class="w-12 h-12 rounded-2xl ${severe?'bg-red-500/10 border-red-500/30 text-red-300':'bg-yellow-500/10 border-yellow-500/30 text-yellow-300'} border flex items-center justify-center shrink-0">
                <i data-lucide="flag"></i>
              </div>
              <div>
                <div class="flex flex-wrap items-center gap-2">
                  <h2 class="text-lg font-black">${report.targetName}</h2>
                  <span class="rounded-full border ${severe?'text-red-300 border-red-500/30 bg-red-500/10':'text-yellow-300 border-yellow-500/30 bg-yellow-500/10'} px-2.5 py-1 text-[10px] font-black">${report.severity}</span>
                  <span class="rounded-full bg-[#09051c] border border-purple-950 px-2.5 py-1 text-[10px] font-black text-purple-300">${report.status}</span>
                </div>
                <p class="text-sm text-purple-300 mt-2"><strong class="text-red-300">Motivo:</strong> ${report.reason} · <strong class="text-red-300">Contexto:</strong> ${report.context}</p>
                <p class="text-sm text-purple-200/80 mt-3">${report.details || 'Sem detalhes adicionais.'}</p>
                <p class="text-[11px] text-purple-500 mt-2">ID: ${report.id} · ${date}</p>
              </div>
            </div>
            <div class="grid grid-cols-2 lg:grid-cols-1 gap-2 min-w-[190px]">
              <button onclick="updateReport('${report.id}','reviewed_no_action')" class="rounded-xl bg-green-500/10 border border-green-500/30 px-4 py-3 text-xs font-black text-green-300 hover:bg-green-500/20">Sem ação</button>
              <button onclick="updateReport('${report.id}','warning_sent')" class="rounded-xl bg-yellow-500/10 border border-yellow-500/30 px-4 py-3 text-xs font-black text-yellow-300 hover:bg-yellow-500/20">Enviar aviso</button>
              <button onclick="updateReport('${report.id}','account_suspended')" class="rounded-xl bg-orange-500/10 border border-orange-500/30 px-4 py-3 text-xs font-black text-orange-300 hover:bg-orange-500/20">Suspender conta</button>
              <button onclick="updateReport('${report.id}','blocked')" class="rounded-xl bg-red-500/10 border border-red-500/30 px-4 py-3 text-xs font-black text-red-300 hover:bg-red-500/20">Bloquear</button>
            </div>
          </div>
        </article>`;
      }).join('');
      lucide.createIcons();
    }

    function updateReport(id,status){
      setReports(getReports().map(item=>item.id===id?{...item,status,reviewedAt:new Date().toISOString()}:item));
    }
  </script>
</body>
</html>
